{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Flights</h2>
<div class="list-group">
{% for flight in flights %}
  <a href="/flight/{{ flight.id }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
    <span>#{{ flight.id }} - {{ flight.name }} ({{ flight.location }})</span>
    <span class="badge bg-primary">{{ flight.images|length }} images</span>
  </a>
{% else %}
  <div class="alert alert-info">No flights uploaded yet.</div>
{% endfor %}
</div>
{% endblock %}
