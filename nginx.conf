import React, { useState, useCallback } from 'react';
import { MapContainer, TileLayer, Marker, Polyline, useMapEvents } from 'react-leaflet';
import L from 'leaflet';
import { useStore } from '../store';
import { createMission, startMission } from '../utils/api';
import 'leaflet/dist/leaflet.css';

function WPPlacer({ onAdd }: { onAdd: (lat: number, lon: number) => void }) {
  useMapEvents({ click(e) { onAdd(e.latlng.lat, e.latlng.lng); } });
  return null;
}

function wpIcon(idx: number) {
  return L.divIcon({
    className: '',
    html: `<div style="width:20px;height:20px;background:rgba(232,134,10,0.15);border:1px solid #e8860a;clip-path:polygon(6px 0,100% 0,100% calc(100% - 6px),calc(100% - 6px) 100%,0 100%,0 6px);display:flex;align-items:center;justify-content:center;font-size:8px;color:#e8860a;font-family:'Share Tech Mono',monospace;font-weight:bold">${idx + 1}</div>`,
    iconSize: [20, 20], iconAnchor: [10, 10],
  });
}

export default function MissionPlanner() {
  const { drones, missions, setMissions, addEvent } = useStore();
  const [waypoints, setWaypoints] = useState<{ lat: number; lon: number; alt: number }[]>([]);
  const [name, setName]           = useState('');
  const [site, setSite]           = useState('');
  const [selectedDrones, setSelected] = useState<string[]>([]);
  const [altitude, setAltitude]   = useState(50);
  const [creating, setCreating]   = useState(false);

  const addWP = useCallback((lat: number, lon: number) => {
    setWaypoints(prev => [...prev, { lat, lon, alt: altitude }]);
  }, [altitude]);

  const autoGrid = () => {
    if (waypoints.length < 2) return;
    const lats = waypoints.map(w => w.lat);
    const lons = waypoints.map(w => w.lon);
    const [minLat, maxLat] = [Math.min(...lats), Math.max(...lats)];
    const [minLon, maxLon] = [Math.min(...lons), Math.max(...lons)];
    const rows = 4, cols = 5;
    const grid = [];
    for (let r = 0; r < rows; r++) {
      const lat = minLat + (maxLat - minLat) * (r / (rows - 1));
      for (let c = r % 2 === 0 ? 0 : cols - 1; r % 2 === 0 ? c < cols : c >= 0; r % 2 === 0 ? c++ : c--) {
        const lon = minLon + (maxLon - minLon) * (c / (cols - 1));
        grid.push({ lat, lon, alt: altitude });
      }
    }
    setWaypoints(grid);
  };

  const handleCreate = async () => {
    if (!name.trim() || waypoints.length === 0) return;
    setCreating(true);
    try {
      const mission = await createMission({
        name, site_name: site, description: '',
        waypoints: waypoints.map(w => ({ ...w, action: 'scan', hover_seconds: 2 })),
        drone_ids: selectedDrones,
      });
      setMissions([mission, ...missions]);
      addEvent('mission', `Mission "${name}" created`, 'success');
      setName(''); setSite(''); setWaypoints([]); setSelected([]);
    } catch { addEvent('mission', 'Mission creation failed', 'error'); }
    finally  { setCreating(false); }
  };

  const mapCenter: [number, number] = waypoints.length > 0
    ? [waypoints[0].lat, waypoints[0].lon]
    : [51.5074, -0.1278];

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 12, height: 'calc(100vh - 94px)' }}>

      {/* Map */}
      <div style={{ overflow: 'hidden', clipPath: 'var(--clip-md)', border: '1px solid var(--seam)' }}>
        <MapContainer center={mapCenter} zoom={15} style={{ height: '100%', width: '100%' }}>
          <TileLayer url="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" attribution="" />
          <WPPlacer onAdd={addWP} />
          {waypoints.map((wp, i) => <Marker key={i} position={[wp.lat, wp.lon]} icon={wpIcon(i)} />)}
          {waypoints.length > 1 && (
            <Polyline positions={waypoints.map(w => [w.lat, w.lon])} pathOptions={{ color: '#e8860a', weight: 1.5, dashArray: '6 4', opacity: 0.7 }} />
          )}
        </MapContainer>
      </div>

      {/* Config */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, overflowY: 'auto' }}>
        <div className="card">
          <div className="card-title">Mission Parameters</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {[['DESIGNATION', name, setName, 'MSN-ALPHA-001'],
              ['SITE', site, setSite, 'Solar Farm Alpha'],
            ].map(([label, val, setter, ph]: any) => (
              <div key={label}>
                <div style={{ fontSize: 8, letterSpacing: 2, color: 'var(--text-lo)', marginBottom: 4 }}>{label}</div>
                <input value={val} onChange={(e: any) => setter(e.target.value)} placeholder={ph} />
              </div>
            ))}
            <div>
              <div style={{ fontSize: 8, letterSpacing: 2, color: 'var(--text-lo)', marginBottom: 4 }}>ALTITUDE (m)</div>
              <input type="number" value={altitude} onChange={e => setAltitude(Number(e.target.value))} min={10} max={200} />
            </div>
          </div>
        </div>

        <div className="card">
          <div className="card-title">Waypoints ({waypoints.length})</div>
          <div style={{ fontSize: 9, color: 'var(--text-lo)', marginBottom: 8 }}>Click map to place · Click to remove</div>
          <div style={{ display: 'flex', gap: 6, marginBottom: 8 }}>
            <button className="btn btn-ghost btn-sm" onClick={autoGrid} disabled={waypoints.length < 2}>Auto Grid</button>
            <button className="btn btn-ghost btn-sm" onClick={() => setWaypoints([])}>Clear</button>
          </div>
          <div style={{ maxHeight: 140, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 2 }}>
            {waypoints.map((wp, i) => (
              <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '3px 0', borderBottom: '1px solid rgba(20,50,69,0.4)', fontSize: 10 }}>
                <span className="mono text-amber">WP{i + 1}</span>
                <span className="mono" style={{ fontSize: 9, color: 'var(--text-mid)' }}>{wp.lat.toFixed(4)}, {wp.lon.toFixed(4)}</span>
                <button onClick={() => setWaypoints(prev => prev.filter((_, j) => j !== i))}
                  style={{ background: 'none', border: 'none', color: 'var(--red)', cursor: 'pointer', fontSize: 14, padding: '0 4px' }}>×</button>
              </div>
            ))}
          </div>
        </div>

        <div className="card">
          <div className="card-title">Assign Units</div>
          {drones.map(drone => (
            <label key={drone.id} style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', padding: '6px 0', borderBottom: '1px solid rgba(20,50,69,0.4)' }}>
              <input type="checkbox" checked={selectedDrones.includes(drone.id)}
                onChange={() => setSelected(prev => prev.includes(drone.id) ? prev.filter(d => d !== drone.id) : [...prev, drone.id])} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 12, fontWeight: 600 }}>{drone.name}</div>
                <div style={{ fontSize: 9, color: 'var(--text-lo)' }}>{drone.model}</div>
              </div>
              <span className={`badge badge-${drone.status}`}>{drone.status}</span>
            </label>
          ))}
        </div>

        <button className="btn btn-primary" onClick={handleCreate}
          disabled={creating || !name.trim() || waypoints.length === 0}
          style={{ width: '100%', justifyContent: 'center' }}>
          {creating ? 'CREATING...' : '◎ COMMIT MISSION'}
        </button>

        <div className="card">
          <div className="card-title">Mission Roster</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 4, maxHeight: 200, overflowY: 'auto' }}>
            {missions.map(m => (
              <div key={m.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '5px 0', borderBottom: '1px solid rgba(20,50,69,0.4)' }}>
                <div>
                  <div style={{ fontSize: 11, fontWeight: 600 }}>{m.name}</div>
                  <div style={{ fontSize: 9, color: 'var(--text-lo)' }}>{m.waypoints.length} WPs</div>
                </div>
                <div style={{ display: 'flex', gap: 5, alignItems: 'center' }}>
                  <span className={`badge badge-${m.status}`}>{m.status}</span>
                  {m.status === 'pending' && (
                    <button className="btn btn-primary btn-sm"
                      onClick={async () => { await startMission(m.id); addEvent('mission', `Started ${m.name}`, 'success'); }}>▶</button>
                  )}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}
