from fastapi import APIRouter, Depends, HTTPException
from sqlalchemy.ext.asyncio import AsyncSession
from sqlalchemy import select
from typing import List
import uuid
from datetime import datetime

from app.core.database import get_db
from app.models.models import Asset, AssetInspection, Image, Detection
from app.schemas.schemas import AssetCreate, AssetResponse, AssetInspectionResponse, ImageResponse

router = APIRouter(tags=["assets"])

# ── Assets ─────────────────────────────────────────────────────────────────

assets_router = APIRouter(prefix="/assets")


@assets_router.post("", response_model=AssetResponse, status_code=201)
async def create_asset(payload: AssetCreate, db: AsyncSession = Depends(get_db)):
    asset = Asset(
        id=str(uuid.uuid4()),
        name=payload.name,
        asset_type=payload.asset_type,
        lat=payload.lat,
        lon=payload.lon,
        elevation=payload.elevation,
        orientation=payload.orientation,
        install_date=payload.install_date,
        metadata_=payload.metadata,
    )
    db.add(asset)
    await db.flush()
    await db.refresh(asset)
    return asset


@assets_router.get("", response_model=List[AssetResponse])
async def list_assets(db: AsyncSession = Depends(get_db)):
    result = await db.execute(select(Asset).order_by(Asset.name))
    return result.scalars().all()


@assets_router.get("/{asset_id}", response_model=AssetResponse)
async def get_asset(asset_id: str, db: AsyncSession = Depends(get_db)):
    asset = await db.get(Asset, asset_id)
    if not asset:
        raise HTTPException(404, "Asset not found")
    return asset


@assets_router.get("/{asset_id}/history", response_model=List[AssetInspectionResponse])
async def get_asset_history(asset_id: str, db: AsyncSession = Depends(get_db)):
    result = await db.execute(
        select(AssetInspection)
        .where(AssetInspection.asset_id == asset_id)
        .order_by(AssetInspection.inspected_at.desc())
    )
    return result.scalars().all()


@assets_router.put("/{asset_id}", response_model=AssetResponse)
async def update_asset(asset_id: str, payload: AssetCreate, db: AsyncSession = Depends(get_db)):
    asset = await db.get(Asset, asset_id)
    if not asset:
        raise HTTPException(404, "Asset not found")
    asset.name = payload.name
    asset.asset_type = payload.asset_type
    asset.lat = payload.lat
    asset.lon = payload.lon
    asset.elevation = payload.elevation
    asset.orientation = payload.orientation
    db.add(asset)
    await db.flush()
    await db.refresh(asset)
    return asset


# ── Mission Images ─────────────────────────────────────────────────────────

mission_images_router = APIRouter(prefix="/missions")


@mission_images_router.get("/{mission_id}/images", response_model=List[ImageResponse])
async def get_mission_images(
    mission_id: str,
    drone_id: str = None,
    processed: bool = None,
    limit: int = 100,
    db: AsyncSession = Depends(get_db),
):
    q = select(Image).where(Image.mission_id == mission_id)
    if drone_id:
        q = q.where(Image.drone_id == drone_id)
    if processed is not None:
        q = q.where(Image.processed == processed)
    q = q.order_by(Image.captured_at.desc()).limit(limit)
    result = await db.execute(q)
    return result.scalars().all()
