import React, { useEffect, useRef, useState, useCallback } from 'react';
import { MapContainer, TileLayer, Marker, Popup, Polyline, useMap } from 'react-leaflet';
import L from 'leaflet';
import { useStore } from '../store';
import { startMission, pauseMission, stopMission } from '../utils/api';
import 'leaflet/dist/leaflet.css';

delete (L.Icon.Default.prototype as any)._getIconUrl;
L.Icon.Default.mergeOptions({
  iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
  iconUrl:       'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
  shadowUrl:     'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
});

const DRONE_COLORS = ['#00c8e0', '#e8860a', '#00e05a'];

function makeDroneIcon(color: string, heading: number) {
  return L.divIcon({
    className: '',
    html: `<div style="width:24px;height:24px;position:relative;transform:rotate(${heading}deg)">
      <div style="position:absolute;inset:0;border-radius:50%;background:${color}18;border:1px solid ${color};box-shadow:0 0 10px ${color}66;"></div>
      <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:${color};box-shadow:0 0 8px ${color}"></div>
      <div style="position:absolute;bottom:50%;left:50%;transform:translateX(-50%);width:1px;height:10px;background:${color};opacity:0.7"></div>
    </div>`,
    iconSize: [24, 24],
    iconAnchor: [12, 12],
  });
}

function MapRecenter({ center }: { center: [number, number] }) {
  const map = useMap();
  useEffect(() => { map.setView(center, map.getZoom()); }, [center, map]);
  return null;
}

function TelPanel({ drone, color }: { drone: any; color: string }) {
  const t = useStore(s => s.telemetry[drone.id]);
  return (
    <div className="card" style={{ borderLeft: `2px solid ${color}`, padding: '10px 12px' }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
        <div style={{ fontWeight: 700, fontSize: 13, color, letterSpacing: 1 }}>{drone.name}</div>
        <span className={`badge badge-${drone.status}`}>{drone.status}</span>
      </div>
      {t ? (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2px 8px' }}>
          {[['LAT', t.lat.toFixed(5)], ['LON', t.lon.toFixed(5)],
            ['ALT', `${t.altitude_m.toFixed(0)}m`], ['SPD', `${t.speed_ms.toFixed(1)}m/s`],
            ['HDG', `${t.heading_deg.toFixed(0)}°`], ['BAT', `${t.battery_pct.toFixed(0)}%`],
            ['SIG', `${t.signal_dbm.toFixed(0)}dBm`], ['GPS', `${t.gps_sats}sat`],
          ].map(([k, v]) => (
            <div key={k} className="tac-row" style={{ padding: '2px 0' }}>
              <span className="tac-key">{k}</span>
              <span className="tac-val" style={{ fontSize: 10 }}>{v}</span>
            </div>
          ))}
        </div>
      ) : (
        <div style={{ fontSize: 10, color: 'var(--text-lo)' }}>AWAITING TELEMETRY</div>
      )}
    </div>
  );
}

export default function LiveView() {
  const { drones, missions, telemetry, addEvent } = useStore();
  const [trails, setTrails] = useState<Record<string, [number, number][]>>({});
  const activeMission = missions.find(m => m.status === 'active');

  useEffect(() => {
    Object.values(telemetry).forEach(t => {
      if (t.lat && t.lon) {
        setTrails(prev => {
          const trail = (prev[t.drone_id] || []).slice(-80);
          return { ...prev, [t.drone_id]: [...trail, [t.lat, t.lon]] };
        });
      }
    });
  }, [telemetry]);

  const mapCenter: [number, number] = (() => {
    const ts = Object.values(telemetry);
    if (ts.length > 0 && ts[0].lat) return [ts[0].lat, ts[0].lon];
    if (drones[0]?.lat) return [drones[0].lat!, drones[0].lon!];
    return [51.5074, -0.1278];
  })();

  const ctrl = async (action: 'start' | 'pause' | 'stop') => {
    if (!activeMission) return;
    try {
      if (action === 'start') await startMission(activeMission.id);
      else if (action === 'pause') await pauseMission(activeMission.id);
      else await stopMission(activeMission.id);
      addEvent('mission', `Mission ${action}ed`, 'success');
    } catch { addEvent('mission', `Mission ${action} failed`, 'error'); }
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12, height: 'calc(100vh - 94px)' }}>

      {/* Mission control bar */}
      {activeMission && (
        <div className="card" style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 16, flexShrink: 0, borderColor: 'rgba(232,134,10,0.3)' }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 8, letterSpacing: 3, color: 'var(--amber)', marginBottom: 2 }}>ACTIVE MISSION</div>
            <div style={{ fontWeight: 700, fontSize: 14, letterSpacing: 1 }}>{activeMission.name}</div>
          </div>
          <div className="ops-btn-row" style={{ display: 'flex', gap: 6 }}>
            <button className="ops-btn ops-hold"    onClick={() => ctrl('pause')}>⏸ HOLD</button>
            <button className="ops-btn ops-execute" onClick={() => ctrl('start')}>▶ EXECUTE</button>
            <button className="ops-btn ops-abort"   onClick={() => ctrl('stop')}>■ ABORT</button>
          </div>
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 260px', gap: 12, flex: 1, minHeight: 0 }}>

        {/* Tactical map */}
        <div style={{ overflow: 'hidden', border: '1px solid var(--seam)', clip: 'auto', clipPath: 'var(--clip-md)', position: 'relative' }}>
          {/* Overlay labels */}
          <div style={{ position: 'absolute', top: 10, left: 10, zIndex: 500, display: 'flex', flexDirection: 'column', gap: 4 }}>
            <div style={{ background: 'rgba(3,12,16,0.9)', border: '1px solid var(--seam)', padding: '4px 10px', fontFamily: 'var(--f-mono)', fontSize: 8, letterSpacing: 2, color: 'var(--cyan)' }}>
              AO ALPHA — RESTRICTED
            </div>
            <div style={{ background: 'rgba(3,12,16,0.9)', border: '1px solid var(--seam)', padding: '4px 10px', fontFamily: 'var(--f-mono)', fontSize: 8, letterSpacing: 2, color: 'var(--amber)' }}>
              {drones.filter(d => d.status === 'flying').length} UNITS AIRBORNE
            </div>
          </div>

          <MapContainer center={mapCenter} zoom={16} style={{ height: '100%', width: '100%' }} zoomControl={false}>
            <TileLayer url="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png" attribution="" />
            <MapRecenter center={mapCenter} />

            {/* Waypoint path */}
            {activeMission?.waypoints && activeMission.waypoints.length > 1 && (
              <Polyline
                positions={activeMission.waypoints.map(w => [w.lat, w.lon])}
                pathOptions={{ color: '#00c8e0', weight: 1, dashArray: '5 4', opacity: 0.4 }}
              />
            )}
            {activeMission?.waypoints.map((wp, i) => (
              <Marker key={i} position={[wp.lat, wp.lon]}
                icon={L.divIcon({ className: '', html: `<div style="width:6px;height:6px;border-radius:50%;background:rgba(0,200,224,0.4);border:1px solid #00c8e0"></div>`, iconSize: [6, 6], iconAnchor: [3, 3] })}
              />
            ))}

            {/* Drones */}
            {drones.map((drone, idx) => {
              const t = telemetry[drone.id];
              const lat = t?.lat ?? drone.lat;
              const lon = t?.lon ?? drone.lon;
              if (!lat || !lon) return null;
              const color = DRONE_COLORS[idx % DRONE_COLORS.length];
              const trail = trails[drone.id] || [];
              return (
                <React.Fragment key={drone.id}>
                  {trail.length > 1 && (
                    <Polyline positions={trail} pathOptions={{ color, weight: 1.5, dashArray: '4 3', opacity: 0.5 }} />
                  )}
                  <Marker position={[lat, lon]} icon={makeDroneIcon(color, t?.heading_deg ?? 0)}>
                    <Popup>
                      <div style={{ background: 'var(--steel)', color: 'var(--text-hi)', padding: 8, minWidth: 130, fontFamily: 'var(--f-mono)', fontSize: 11 }}>
                        <strong style={{ color }}>{drone.name}</strong><br/>
                        Alt: {t?.altitude_m?.toFixed(0)}m &nbsp; Bat: {t?.battery_pct?.toFixed(0)}%
                      </div>
                    </Popup>
                  </Marker>
                </React.Fragment>
              );
            })}
          </MapContainer>
        </div>

        {/* Telemetry panels */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8, overflowY: 'auto' }}>
          <div style={{ fontSize: 8, letterSpacing: 3, color: 'var(--text-lo)', textTransform: 'uppercase', marginBottom: 2 }}>Unit Telemetry</div>
          {drones.map((drone, idx) => (
            <TelPanel key={drone.id} drone={drone} color={DRONE_COLORS[idx % DRONE_COLORS.length]} />
          ))}
        </div>
      </div>
    </div>
  );
}
