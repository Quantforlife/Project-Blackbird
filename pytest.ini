from fastapi import APIRouter, Depends, HTTPException
from sqlalchemy.ext.asyncio import AsyncSession
from sqlalchemy import select
from typing import List
import uuid

from app.core.database import get_db
from app.models.models import Detection, Image, Asset, DefectSeverity
from app.schemas.schemas import DetectionCreate, DetectionResponse

router = APIRouter(prefix="/detections", tags=["detections"])


@router.post("", response_model=DetectionResponse, status_code=201)
async def create_detection(payload: DetectionCreate, db: AsyncSession = Depends(get_db)):
    image = await db.get(Image, payload.image_id)
    if not image:
        raise HTTPException(404, "Image not found")

    detection = Detection(
        id=str(uuid.uuid4()),
        image_id=payload.image_id,
        asset_id=payload.asset_id,
        label=payload.label,
        confidence=payload.confidence,
        severity=payload.severity,
        bbox_x=payload.bbox_x,
        bbox_y=payload.bbox_y,
        bbox_w=payload.bbox_w,
        bbox_h=payload.bbox_h,
        is_manual=payload.is_manual,
        notes=payload.notes,
    )
    db.add(detection)
    await db.flush()
    await db.refresh(detection)
    return detection


@router.get("/{detection_id}", response_model=DetectionResponse)
async def get_detection(detection_id: str, db: AsyncSession = Depends(get_db)):
    d = await db.get(Detection, detection_id)
    if not d:
        raise HTTPException(404, "Detection not found")
    return d


@router.put("/{detection_id}", response_model=DetectionResponse)
async def update_detection(
    detection_id: str,
    payload: DetectionCreate,
    db: AsyncSession = Depends(get_db),
):
    d = await db.get(Detection, detection_id)
    if not d:
        raise HTTPException(404, "Detection not found")
    d.label = payload.label
    d.confidence = payload.confidence
    d.severity = payload.severity
    d.bbox_x = payload.bbox_x
    d.bbox_y = payload.bbox_y
    d.bbox_w = payload.bbox_w
    d.bbox_h = payload.bbox_h
    d.notes = payload.notes
    d.is_manual = True
    db.add(d)
    await db.flush()
    await db.refresh(d)
    return d


@router.delete("/{detection_id}", status_code=204)
async def delete_detection(detection_id: str, db: AsyncSession = Depends(get_db)):
    d = await db.get(Detection, detection_id)
    if not d:
        raise HTTPException(404, "Detection not found")
    await db.delete(d)


@router.get("", response_model=List[DetectionResponse])
async def list_detections(
    mission_id: str = None,
    label: str = None,
    severity: str = None,
    limit: int = 100,
    db: AsyncSession = Depends(get_db),
):
    q = select(Detection)
    if mission_id:
        q = q.join(Image).where(Image.mission_id == mission_id)
    if label:
        q = q.where(Detection.label == label)
    if severity:
        q = q.where(Detection.severity == severity)
    q = q.order_by(Detection.created_at.desc()).limit(limit)
    result = await db.execute(q)
    return result.scalars().all()
